{% extends "account/base.html" %}
{% load allauth account %}

{% block title %}Password updated · {{ SITE_NAME }}{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
  <div class="card bg-base-100 shadow-xl border border-base-300">
    <div class="card-body">
      <h1 class="text-2xl font-bold">Password updated</h1>
      <p class="text-sm opacity-70">You can now log in with your new password.</p>

      <div role="alert" class="alert alert-success mt-2">
        <span>Your password has been changed.</span>
      </div>

      <div class="divider my-4"></div>

      <a href="{% url 'account_login' %}" class="btn btn-primary w-full">Log in</a>
    </div>
  </div>
</div>
{% endblock %}
