{% extends "base.html" %}

{% block title %}Delete {{ quiz.title }} · {{ SITE_NAME }}{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">
  <div class="card bg-base-100 shadow-xl border border-base-300">
    <div class="card-body">
      <h1 class="text-2xl font-bold text-error">Delete quiz?</h1>
      <p class="text-sm">
        This will permanently delete &ldquo;<span class="font-semibold">{{ quiz.title }}</span>&rdquo;
        along with all its questions and choices. This can't be undone.
      </p>

      <form method="post" action="{% url 'quizzes:quiz_delete' slug=quiz.slug %}"
        class="flex flex-col gap-2 sm:flex-row sm:justify-end mt-4">
        {% csrf_token %}
        <a href="{% url 'quizzes:detail' slug=quiz.slug %}" class="btn btn-ghost">Cancel</a>
        <button type="submit" class="btn btn-error">Yes, delete</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
