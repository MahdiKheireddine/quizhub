<!DOCTYPE html>
<html lang="en" data-theme="dim">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Something went wrong · QuizHub</title>
<style>
  body { margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
         background:#1a1d29; color:#d1d5db; min-height:100vh;
         display:flex; align-items:center; justify-content:center; padding:2rem; }
  .card { max-width:480px; text-align:center; }
  .num { font-size:6rem; font-weight:900; color:#a78bfa; margin:0 0 .5rem; line-height:1; }

  p { opacity:.7; margin:0 0 1.5rem; line-height:1.6; }
  a { display:inline-block; padding:.625rem 1.25rem; background:#a78bfa; color:#1a1d29;
      text-decoration:none; border-radius:.5rem; font-weight:500; }
  a:hover { opacity:.9; }
</style>
</head>
<body>
  <div class="card">
    <p class="num">500</p>
    <h1>Something went wrong</h1>

</html>
