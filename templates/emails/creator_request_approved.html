{% extends "emails/_base.html" %}
{% block body %}
  <p>Hi {{ recipient.username }},</p>

  <p>
    Good news — your creator request on {{ site_name }} was
    <strong style="color:#16a34a;">approved</strong>.
    You can now build and publish quizzes.
  </p>

  <p>
    <a href="{{ quizzes_url }}"
       style="display:inline-block;background:#4f46e5;color:white;padding:10px 20px;text-decoration:none;border-radius:6px;">
      Build your first quiz
    </a>
  </p>

  <p style="color:#666;font-size:13px;">Or paste this into your browser: {{ quizzes_url }}</p>
{% endblock %}
