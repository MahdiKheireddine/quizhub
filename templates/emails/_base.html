{% comment %}
Email layout. Inline styles only — Gmail/Outlook/Apple Mail strip <style>
tags and apply external CSS inconsistently. Inline is the only thing that
renders reliably across clients.
{% endcomment %}<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>{{ subject|default:site_name }}</title>
</head>
<body style="margin:0;padding:0;background:#f4f4f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;color:#111;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0">
    <tr>
      <td align="center" style="padding:32px 16px;">
        <table width="560" cellpadding="0" cellspacing="0" border="0" style="background:white;border-radius:8px;overflow:hidden;">
          <tr>
            <td style="padding:24px 32px;border-bottom:1px solid #eee;">
              <strong style="font-size:18px;">{{ site_name }}</strong>
            </td>
          </tr>
          <tr>
            <td style="padding:32px;line-height:1.6;font-size:15px;">
              {% block body %}{% endblock %}
            </td>
          </tr>
          <tr>
            <td style="padding:16px 32px;background:#f9f9fb;font-size:12px;color:#888;border-top:1px solid #eee;">
              You're getting this because you have a {{ site_name }} account.
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
