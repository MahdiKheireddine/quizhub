# Render Blueprint — declarative service + database definition.
# Render reads this file when you "Create a Blueprint" pointing at this repo.
# See: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: quizhub
    runtime: python
    plan: free
    region: frankfurt              # closest to North Africa / Europe; change if needed
    branch: main
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application --workers 2 --bind 0.0.0.0:$PORT
    autoDeploy: true               # deploy on every push to `branch`
    healthCheckPath: /             # any 200 response counts as healthy

    envVars:
      # Auto-generated by Render
      - key: SECRET_KEY
        generateValue: true

      # Linked to the database below
      - key: DATABASE_URL
        fromDatabase:
          name: quizhub-db
          property: connectionString

      # Select the production settings module
      - key: DJANGO_SETTINGS_MODULE
        value: config.django.production

      # Production toggles
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: quizhub.onrender.com   # update if you change the service name
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: https://quizhub.onrender.com

      # Email — set these in the Render dashboard manually, not here
      # (don't commit credentials). Render will prompt for them on first
      # blueprint apply because they have `sync: false`.
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: DEFAULT_FROM_EMAIL
        sync: false

      # Python version (also pinned in runtime.txt; both must agree)
      - key: PYTHON_VERSION
        value: 3.10.8

databases:
  - name: quizhub-db
    plan: free
    region: frankfurt
    databaseName: quizhub
    user: quizhub